<!DOCTYPE html>
<html lang="no" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shotlist Planner — Studio Wallin</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shotlist">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
<style>
/* ── THEME OVERRIDES ── */
[data-theme="night"] {
  --p: 258 88% 68%;
  --pf: 258 88% 56%;
  --pc: 0 0% 100%;
  --b1: 240 96% 4%;
  --b2: 240 80% 6%;
  --b3: 240 65% 8%;
  --bc: 240 18% 88%;
  --su: 160 60% 51%;
  --suc: 160 10% 10%;
}

/* ── GLOBALS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --dim: #35355a;
  --mid: #6060a0;
  --accent: hsl(258 88% 68%);
  --accent2: hsl(268 85% 78%);
  --glow: hsla(258,88%,68%,.22);
  --green: #34d399;
  --gdim: rgba(52,211,153,.12);
  --gborder: rgba(52,211,153,.28);
  --blue: #60a5fa;
  --amber: #fbbf24;
  --red: #f87171;
  --r: 12px;
}

html, body { height: 100%; overflow: hidden; }
body { background: hsl(var(--b1)); color: hsl(var(--bc)); font-family: var(--mono); display: flex; flex-direction: column; min-height: 100vh; }

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 55% at 18% -8%, hsla(258,88%,68%,.10) 0%, transparent 55%),
    radial-gradient(ellipse 55% 40% at 88% 108%, rgba(52,211,153,.05) 0%, transparent 50%);
}

/* ── HEADER ── */
.app-header {
  position: relative; z-index: 100; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; height: 52px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  backdrop-filter: blur(24px);
  background: rgba(6,6,15,.85);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  box-shadow: 0 0 16px var(--glow);
}
.brand-label { font-size: 9px; letter-spacing: .18em; color: var(--dim); text-transform: uppercase; font-family: var(--mono); line-height: 1; }
.brand-name { font-size: 15px; font-weight: 800; letter-spacing: -.02em; font-family: var(--sans); line-height: 1.1; }
.hdr-right { display: flex; gap: 5px; align-items: center; }
.hdr-desktop { display: contents; }
.hdr-mobile { display: none; }
.vline { width: 1px; height: 20px; background: rgba(255,255,255,.07); margin: 0 2px; }

/* ── LAYOUT ── */
.app {
  display: grid; grid-template-columns: 1fr 330px;
  flex: 1; overflow: hidden; min-height: 0;
  position: relative; z-index: 1;
  transition: grid-template-columns .3s ease;
}
.app.focused { grid-template-columns: 1fr 0; }
.app.focused .sidebar { opacity: 0; pointer-events: none; }

/* ── EDITOR ── */
.editor { padding: 16px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

/* ── META ── */
.project-meta {
  background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--r); padding: 12px 16px;
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
}
.meta-field label { display: block; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); font-family: var(--mono); margin-bottom: 5px; }
.meta-field input {
  width: 100%; background: transparent; border: none;
  border-bottom: 1px solid rgba(255,255,255,.11); color: hsl(var(--bc));
  font-size: 13px; font-family: var(--mono); outline: none; padding: 3px 0;
  transition: border-color .15s;
}
.meta-field input:focus { border-bottom-color: var(--accent); }
.meta-field input::placeholder { color: var(--dim); }

/* ── TEMPLATE BAR ── */
.tpl-bar { display: flex; align-items: center; gap: 5px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.tpl-bar::-webkit-scrollbar { display: none; }
.tpl-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); font-family: var(--mono); white-space: nowrap; flex-shrink: 0; }

/* ── SECTIONS ── */
.sections { display: flex; flex-direction: column; gap: 10px; }
.empty-state {
  text-align: center; padding: 50px 20px; color: var(--dim);
  font-family: var(--mono); font-size: 11px; line-height: 1.7;
  border: 1px dashed rgba(255,255,255,.06); border-radius: var(--r);
  background: rgba(255,255,255,.02);
}
.empty-icon { font-size: 28px; margin-bottom: 10px; opacity: .4; }

/* ── SECTION CARD ── */
.section-card {
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.06);
  border-left: 3px solid var(--sc, var(--accent));
  border-radius: var(--r); overflow: hidden;
  transition: box-shadow .2s, border-color .2s;
}
.section-card:hover { border-color: rgba(255,255,255,.1); box-shadow: 0 4px 24px rgba(0,0,0,.3); }
.section-card.drag-over { border-color: var(--sc, var(--accent)); box-shadow: 0 0 0 1px var(--sc, var(--accent)), 0 0 20px var(--glow); }
.section-card.dragging { opacity: .4; }

.sec-hdr {
  display: flex; align-items: center; gap: 7px; padding: 9px 12px;
  background: rgba(255,255,255,.018);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.section-card.collapsed .sec-hdr { border-bottom: none; }
.grip { color: var(--dim); font-size: 11px; cursor: grab; flex-shrink: 0; padding: 2px; transition: color .12s; line-height: 1; }
.grip:hover { color: var(--mid); }
.grip:active { cursor: grabbing; }
.color-dot {
  width: 9px; height: 9px; border-radius: 50%; background: var(--sc, var(--accent));
  flex-shrink: 0; cursor: pointer; transition: transform .15s;
  box-shadow: 0 0 8px var(--sc, var(--accent));
}
.color-dot:hover { transform: scale(1.6); }
.sec-name {
  flex: 1; background: transparent; border: none; color: hsl(var(--bc));
  font-size: 10.5px; font-weight: 700; font-family: var(--sans);
  letter-spacing: .1em; text-transform: uppercase; outline: none; min-width: 0;
}
.sec-name::placeholder { color: var(--dim); }
.sec-actions { display: flex; gap: 1px; align-items: center; flex-shrink: 0; }
.sec-btn-del:hover { color: var(--red) !important; }

.sec-body { padding: 7px 12px 11px; display: flex; flex-direction: column; gap: 3px; }
.section-card.collapsed .sec-body { display: none; }

/* ── ROWS ── */
.row-item { display: flex; align-items: flex-start; gap: 7px; padding: 4px 5px; border-radius: 7px; transition: background .1s; }
.row-item:hover { background: rgba(255,255,255,.03); }
.row-item:hover .row-del { opacity: 1; }
.shot-num { font-family: var(--mono); font-size: 9px; color: var(--dim); margin-top: 7px; flex-shrink: 0; width: 18px; text-align: right; }
.row-spacer { width: 16px; flex-shrink: 0; margin-top: 3px; }
.row-cb { margin-top: 3px; flex-shrink: 0; }
.row-text {
  flex: 1; background: transparent; border: none; color: hsl(var(--bc));
  font-size: 12.5px; font-family: var(--mono); outline: none; resize: none;
  line-height: 1.55; padding: 0; min-height: 20px; overflow: hidden;
}
.row-text::placeholder { color: var(--dim); }
.row-text.qt { color: var(--amber); font-style: italic; }
.row-text.nt { color: #6878b8; font-size: 12px; }
.row-item.done .row-text { text-decoration: line-through; opacity: .4; }
.row-del { opacity: 0; margin-top: 1px; transition: opacity .12s; }
.row-del.btn:hover { color: var(--red) !important; }

/* ── ADD ROW ── */
.add-row-bar { display: flex; gap: 5px; margin-top: 5px; padding-top: 7px; border-top: 1px solid rgba(255,255,255,.06); }
.btn-row-shot { color: var(--green) !important; border-color: rgba(52,211,153,.2) !important; }
.btn-row-shot:hover { background: rgba(52,211,153,.08) !important; border-color: rgba(52,211,153,.4) !important; }
.btn-row-note { color: var(--blue) !important; border-color: rgba(96,165,250,.2) !important; }
.btn-row-note:hover { background: rgba(96,165,250,.08) !important; border-color: rgba(96,165,250,.4) !important; }
.btn-row-quote { color: var(--amber) !important; border-color: rgba(251,191,36,.2) !important; }
.btn-row-quote:hover { background: rgba(251,191,36,.08) !important; border-color: rgba(251,191,36,.4) !important; }

.add-sec-btn {
  background: transparent; border: 1px dashed rgba(255,255,255,.07);
  border-radius: var(--r); padding: 12px; font-size: 11px; font-family: var(--mono);
  color: var(--dim); cursor: pointer; transition: all .15s; width: 100%; text-align: center; letter-spacing: .06em;
}
.add-sec-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,106,247,.05); }

/* ── SIDEBAR ── */
.sidebar {
  border-left: 1px solid rgba(255,255,255,.06); display: flex; flex-direction: column;
  overflow: hidden; background: rgba(4,4,18,.7); backdrop-filter: blur(12px);
  transition: opacity .25s;
}
.sb-hdr { padding: 12px 14px 10px; border-bottom: 1px solid rgba(255,255,255,.06); flex-shrink: 0; }
.sb-title { font-size: 9px; letter-spacing: .15em; color: var(--dim); text-transform: uppercase; font-family: var(--mono); margin-bottom: 10px; }

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
.stat-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); border-radius: 9px; padding: 8px 10px; }
.stat-val { font-size: 20px; font-weight: 800; font-family: var(--sans); line-height: 1; margin-bottom: 2px; }
.stat-lbl { font-size: 8.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); font-family: var(--mono); }
.stat-card.sv .stat-val { color: var(--accent2); }
.stat-card.sg .stat-val { color: var(--green); }

.prog-label { display: flex; justify-content: space-between; font-size: 9.5px; font-family: var(--mono); color: var(--mid); margin-bottom: 5px; }
/* DaisyUI progress bar */
progress.prog-bar { height: 4px; display: block; width: 100%; }

.preview-wrap { flex: 1; overflow-y: auto; padding: 12px 14px; }
pre#preview { font-family: var(--mono); font-size: 10.5px; line-height: 1.85; color: #565690; white-space: pre-wrap; word-break: break-word; }
.prev-empty { text-align: center; padding: 40px 12px; color: var(--dim); font-family: var(--mono); font-size: 10.5px; line-height: 1.7; }

.btn-copy {
  background: var(--gdim); color: var(--green); border: none;
  border-top: 1px solid var(--gborder); width: 100%; padding: 12px;
  font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: .06em;
  transition: all .15s; flex-shrink: 0; font-family: var(--mono);
}
.btn-copy:hover { background: rgba(52,211,153,.18); }
.btn-copy.ok { color: #34d399; }

.status-bar {
  padding: 5px 14px; border-top: 1px solid rgba(255,255,255,.06);
  font-family: var(--mono); font-size: 9px; color: var(--dim);
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); transition: all .3s; flex-shrink: 0; }
.sdot.saving { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: blink .7s ease infinite; }
.sdot.saved { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,.5); }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* ── TOAST ── */
.toast-msg {
  position: fixed; bottom: 18px; right: 18px;
  background: hsl(var(--b2)); color: hsl(var(--bc)); border: 1px solid rgba(255,255,255,.12);
  padding: 9px 15px; border-radius: 9px; font-family: var(--mono); font-size: 10.5px;
  opacity: 0; transform: translateY(5px) scale(.97);
  transition: all .2s; pointer-events: none; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.toast-msg.show { opacity: 1; transform: translateY(0) scale(1); }

/* ── DaisyUI fixes ── */
.btn { font-family: var(--mono); letter-spacing: .04em; }
.btn-primary { box-shadow: 0 0 0 0 var(--glow); }
.btn-primary:hover { box-shadow: 0 0 18px var(--glow); }
.checkbox { border-radius: 4px; }
/* DaisyUI btm-nav: hide on desktop */
.btm-nav { display: none !important; font-family: var(--mono); }

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.07); border-radius: 2px; }

/* ── DESKTOP RESPONSIVE ── */
@media(max-width:900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { border-left: none; border-top: 1px solid rgba(255,255,255,.06); max-height: 340px; }
  .project-meta { grid-template-columns: 1fr 1fr; }
  .stats-grid { grid-template-columns: repeat(4,1fr); }
}

/* ── MOBILE ── */
@media(max-width:767px) {
  .app-header {
    padding-top: max(10px, env(safe-area-inset-top));
    padding-left: max(14px, env(safe-area-inset-left));
    padding-right: max(14px, env(safe-area-inset-right));
    height: auto; min-height: 52px;
  }
  .hdr-desktop { display: none; }
  .hdr-mobile { display: flex; align-items: center; gap: 5px; }
  .brand-label { display: none; }

  .app { display: block; position: relative; overflow: hidden; }
  .editor, .sidebar {
    position: absolute; inset: 0; width: 100%; height: 100%;
    overflow-y: auto; border: none; max-height: none;
    transition: transform .28s cubic-bezier(.4,0,.2,1);
  }
  .editor { transform: translateX(0); padding-bottom: calc(72px + env(safe-area-inset-bottom)); }
  .sidebar { transform: translateX(100%); }
  .app.tab-sidebar .editor { transform: translateX(-100%); }
  .app.tab-sidebar .sidebar { transform: translateX(0); }
  .app.focused .sidebar { opacity: 1; pointer-events: auto; }

  .project-meta { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }

  /* show btm-nav on mobile */
  .btm-nav { display: flex !important; }
  .btm-nav { padding-bottom: env(safe-area-inset-bottom); }
  .toast-msg { bottom: calc(72px + env(safe-area-inset-bottom)); right: 12px; }

  /* bigger touch targets */
  .row-cb.checkbox { width: 20px !important; height: 20px !important; }
  .row-del { opacity: 1 !important; }
  .row-del.btn { min-height: 36px; padding: 4px 10px; }
  .add-row-bar .btn { min-height: 36px; padding: 5px 12px; font-size: 11px; }
  .sec-actions .btn { min-height: 36px; padding: 5px 8px; }
  .color-dot { width: 14px !important; height: 14px !important; }
  .add-sec-btn { padding: 16px; }
  .btn-copy { padding: 16px; font-size: 13px; }
  .tpl-bar .btn { padding: 6px 12px; font-size: 11px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-mark">🎬</div>
    <div>
      <div class="brand-label">Studio Wallin</div>
      <div class="brand-name">Shotlist Planner</div>
    </div>
  </div>
  <div class="hdr-right">
    <!-- Desktop buttons -->
    <div class="hdr-desktop">
      <button class="btn btn-ghost btn-sm btn-square" id="focusBtn" onclick="toggleFocus()" title="Fokus-modus (F)">⊞</button>
      <div class="vline"></div>
      <button class="btn btn-ghost btn-sm" onclick="importShot()">↑ Importer</button>
      <button class="btn btn-ghost btn-sm" onclick="exportShot()">↓ Eksporter</button>
      <button class="btn btn-ghost btn-sm" onclick="clearAll()">Nullstill</button>
    </div>
    <button class="btn btn-primary btn-sm" onclick="addSection()">+ Seksjon</button>
    <!-- Mobile overflow dropdown (DaisyUI) -->
    <div class="hdr-mobile">
      <div class="dropdown dropdown-end" id="overflowDrop">
        <label tabindex="0" class="btn btn-ghost btn-sm btn-square" onclick="toggleOverflow()">⋯</label>
        <ul tabindex="0" class="dropdown-content menu bg-base-200 rounded-box w-44 p-2 shadow-xl z-50 border border-base-300">
          <li><a onclick="importShot();closeOverflow()">↑ Importer</a></li>
          <li><a onclick="exportShot();closeOverflow()">↓ Eksporter</a></li>
          <li><a onclick="toggleFocus();closeOverflow()">⊞ Fokus-modus</a></li>
          <li><a onclick="clearAll();closeOverflow()">Nullstill</a></li>
        </ul>
      </div>
    </div>
  </div>
</header>
<input type="file" id="importFileInput" accept=".swshot,.json" style="display:none" onchange="handleImportFile(event)">

<div class="app" id="app">
  <div class="editor" id="editor">

    <div class="project-meta">
      <div class="meta-field">
        <label>Prosjekt / Kunde</label>
        <input id="metaClient" type="text" placeholder="f.eks. Ola Nordmann" oninput="save()">
      </div>
      <div class="meta-field">
        <label>Dato for opptak</label>
        <input id="metaDate" type="date" oninput="save()" style="color-scheme:dark">
      </div>
      <div class="meta-field">
        <label>Fotograf / Kamera</label>
        <input id="metaCrew" type="text" placeholder="f.eks. Stephan / Markus" oninput="save()">
      </div>
    </div>

    <div class="tpl-bar">
      <span class="tpl-label">Mal:</span>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('bolig')">Boligsalg</button>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('intervju')">Intervju</button>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('social')">SoMe</button>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('event')">Event</button>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('produkt')">Produkt</button>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('podcast')">Podcast-video</button>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('testimonial')">Testimonial</button>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('bts')">Behind the Scenes</button>
      <button class="btn btn-xs btn-ghost" style="border-radius:20px;white-space:nowrap;flex-shrink:0" onclick="loadTemplate('brand')">Brand film</button>
    </div>

    <div class="sections" id="sections">
      <div class="empty-state">
        <div class="empty-icon">🎬</div>
        Klikk «+ Seksjon» eller velg en mal for å starte
      </div>
    </div>

    <button class="add-sec-btn" onclick="addSection()">+ Legg til seksjon</button>

  </div>

  <div class="sidebar" id="sidebar">
    <div class="sb-hdr">
      <div class="sb-title">Oversikt</div>
      <div class="stats-grid">
        <div class="stat-card sv">
          <div class="stat-val" id="stShots">0</div>
          <div class="stat-lbl">Shots</div>
        </div>
        <div class="stat-card sg">
          <div class="stat-val" id="stDone">0</div>
          <div class="stat-lbl">Ferdig</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stSecs">0</div>
          <div class="stat-lbl">Seksjoner</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stTime">—</div>
          <div class="stat-lbl">Est. tid</div>
        </div>
      </div>
      <div class="prog-label">
        <span>Fremgang</span>
        <span id="progTxt">0 / 0</span>
      </div>
      <progress class="progress progress-success prog-bar" id="progFill" value="0" max="100"></progress>
    </div>
    <div class="preview-wrap">
      <pre id="preview"><div class="prev-empty">Formattert shotlist\nvises her...</div></pre>
    </div>
    <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">Kopier til Milanote</button>
    <div class="status-bar">
      <div class="sdot" id="sdot"></div>
      <span id="statusBar">Klar</span>
    </div>
  </div>
</div>

<!-- DaisyUI bottom nav (mobile only) -->
<div class="btm-nav btm-nav-sm">
  <button id="tabEditor" class="active" onclick="switchTab('editor')">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    <span class="btm-nav-label">Shotlist</span>
  </button>
  <button id="tabSidebar" onclick="switchTab('sidebar')">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    <span class="btm-nav-label">Oversikt</span>
  </button>
</div>

<div class="toast-msg" id="toast"></div>

<script>
// ── STATE ──
let sections = [];
let meta = { client:'', date:'', crew:'' };
let dragSrc = null;
let focusMode = false;
let saveTimer;

const COLORS = ['#7c6af7','#34d399','#60a5fa','#fbbf24','#f87171','#f472b6','#2dd4bf','#a78bfa'];

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('sw-shotlist-v2');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      sections = (d.sections || []).map((s, i) => ({
        collapsed: false, color: COLORS[i % COLORS.length], ...s,
      }));
      meta = d.meta || {};
      document.getElementById('metaClient').value = meta.client || '';
      document.getElementById('metaDate').value = meta.date || '';
      document.getElementById('metaCrew').value = meta.crew || '';
    } catch(e) {}
  }
  renderAll();
  document.addEventListener('keydown', handleGlobalKey);
  document.addEventListener('click', e => {
    if (!e.target.closest('#overflowDrop')) closeOverflow();
  });
});

function handleGlobalKey(e) {
  if (e.key === 'f' && !e.target.matches('input,textarea')) toggleFocus();
}

function getMeta() {
  return {
    client: document.getElementById('metaClient').value,
    date: document.getElementById('metaDate').value,
    crew: document.getElementById('metaCrew').value,
  };
}

function save() {
  meta = getMeta();
  localStorage.setItem('sw-shotlist-v2', JSON.stringify({ sections, meta }));
  const dot = document.getElementById('sdot');
  const bar = document.getElementById('statusBar');
  dot.className = 'sdot saving';
  bar.textContent = 'Lagrer...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const now = new Date();
    dot.className = 'sdot saved';
    bar.textContent = `Lagret ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setTimeout(() => { dot.className = 'sdot'; }, 2500);
  }, 400);
}

// ── MODELS ──
function makeSection(name='', rows=null, color=null) {
  return {
    id: Date.now() + Math.random(),
    name, rows: rows || [],
    collapsed: false,
    color: color || COLORS[sections.length % COLORS.length],
  };
}
function makeRow(type='shot', text='', checked=false) {
  return { id: Date.now() + Math.random(), type, text, checked };
}

// ── SECTIONS ──
function addSection(name='') {
  sections.push(makeSection(name));
  renderAll(); save();
}
function deleteSection(id) {
  sections = sections.filter(s => s.id !== id);
  renderAll(); save();
}
function updateSectionName(id, val) {
  const s = sections.find(s => s.id === id);
  if (s) { s.name = val; updatePreview(); save(); }
}
function toggleCollapse(id) {
  const s = sections.find(s => s.id === id);
  if (s) { s.collapsed = !s.collapsed; renderSections(); }
}
function cycleColor(id) {
  const s = sections.find(s => s.id === id);
  if (!s) return;
  const i = COLORS.indexOf(s.color);
  s.color = COLORS[(i + 1) % COLORS.length];
  renderAll(); save();
}

// ── ROWS ──
function addRow(secId, type) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  const row = makeRow(type);
  sec.rows.push(row);
  renderAll(); save();
  requestAnimationFrame(() => {
    const el = document.getElementById(`r-${row.id}`);
    if (el) { el.focus(); autoResize(el); }
  });
}
function deleteRow(secId, rowId) {
  const sec = sections.find(s => s.id === secId);
  if (sec) sec.rows = sec.rows.filter(r => r.id !== rowId);
  renderAll(); save();
}
function updateRow(secId, rowId, field, val) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  const row = sec.rows.find(r => r.id === rowId);
  if (row) { row[field] = val; updatePreview(); updateStats(); save(); }
}
function toggleCheck(secId, rowId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec) return;
  const row = sec.rows.find(r => r.id === rowId);
  if (row) { row.checked = !row.checked; renderSections(); updatePreview(); updateStats(); save(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
function handleRowKey(e, secId, rowId) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const sec = sections.find(s => s.id === secId);
    if (!sec) return;
    const idx = sec.rows.findIndex(r => r.id === rowId);
    addRow(secId, sec.rows[idx]?.type || 'shot');
  }
}

// ── RENDER ──
function renderAll() {
  renderSections(); updatePreview(); updateStats();
}

function renderSections() {
  const container = document.getElementById('sections');
  if (!sections.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div>Klikk «+ Seksjon» eller velg en mal for å starte</div>`;
    return;
  }
  let shotNum = 0;
  container.innerHTML = sections.map(sec => {
    const rowsHtml = sec.rows.map(row => {
      if (row.type === 'shot') shotNum++;
      return renderRow(sec.id, row, row.type === 'shot' ? shotNum : null);
    }).join('');
    const color = sec.color || COLORS[0];
    const shotCount = sec.rows.filter(r => r.type === 'shot').length;
    return `
      <div class="section-card ${sec.collapsed ? 'collapsed' : ''}" data-id="${sec.id}" style="--sc:${color}"
           draggable="true"
           ondragstart="sdStart(event)" ondragover="sdOver(event)"
           ondrop="sdDrop(event)" ondragend="sdEnd(event)">
        <div class="sec-hdr">
          <span class="grip" title="Dra for å flytte">⠿⠿</span>
          <div class="color-dot" onclick="cycleColor(${sec.id})" draggable="false" title="Endre farge"></div>
          <input class="sec-name" type="text" value="${esc(sec.name)}"
                 placeholder="SEKSJONSOVERSKRIFT"
                 oninput="updateSectionName(${sec.id}, this.value)"
                 ondragstart="event.stopPropagation()">
          <span class="badge badge-sm" style="background:rgba(255,255,255,.06);color:var(--mid);flex-shrink:0">${shotCount} shots</span>
          <div class="sec-actions">
            <button class="btn btn-xs btn-ghost btn-square" onclick="toggleCollapse(${sec.id})" style="font-size:10px">${sec.collapsed ? '▶' : '▼'}</button>
            <button class="btn btn-xs btn-ghost btn-square sec-btn-del" onclick="deleteSection(${sec.id})">✕</button>
          </div>
        </div>
        <div class="sec-body">
          ${rowsHtml}
          <div class="add-row-bar">
            <button class="btn btn-xs btn-ghost btn-row-shot" onclick="addRow(${sec.id},'shot')">+ Shot</button>
            <button class="btn btn-xs btn-ghost btn-row-note" onclick="addRow(${sec.id},'note')">+ Notat</button>
            <button class="btn btn-xs btn-ghost btn-row-quote" onclick="addRow(${sec.id},'quote')">+ Sitat</button>
          </div>
        </div>
      </div>`;
  }).join('');
  document.querySelectorAll('.row-text').forEach(autoResize);
}

function renderRow(secId, row, shotNum) {
  const badgeClass = row.type === 'shot' ? 'badge-success' : row.type === 'quote' ? 'badge-warning' : 'badge-info';
  const badgeText = row.type === 'shot' ? 'SHOT' : row.type === 'quote' ? 'SITAT' : 'NOTAT';
  const textClass = row.type === 'quote' ? 'qt' : row.type === 'note' ? 'nt' : '';
  const ph = row.type === 'shot' ? 'f.eks. Wide av stue · Clossup detalj'
           : row.type === 'quote' ? '"Sitat fra intervjuobjekt..."'
           : 'Notat / instruksjon...';
  const numHtml = shotNum !== null
    ? `<span class="shot-num">${String(shotNum).padStart(2,'0')}</span>`
    : `<span class="shot-num" style="opacity:0">--</span>`;
  const cb = row.type === 'shot'
    ? `<input type="checkbox" class="checkbox checkbox-success checkbox-sm row-cb" ${row.checked ? 'checked' : ''} onchange="toggleCheck(${secId},${row.id})">`
    : `<div class="row-spacer"></div>`;
  return `
    <div class="row-item ${row.checked ? 'done' : ''}">
      ${numHtml}
      <span class="badge badge-sm ${badgeClass}" style="flex-shrink:0;margin-top:4px">${badgeText}</span>
      ${cb}
      <textarea id="r-${row.id}" class="row-text ${textClass}" rows="1"
                placeholder="${ph}"
                oninput="updateRow(${secId},${row.id},'text',this.value);autoResize(this)"
                onkeydown="handleRowKey(event,${secId},${row.id})"
      >${esc(row.text)}</textarea>
      <button class="btn btn-xs btn-ghost btn-square row-del" onclick="deleteRow(${secId},${row.id})">✕</button>
    </div>`;
}

// ── STATS ──
function updateStats() {
  const totalShots = sections.reduce((a,s) => a + s.rows.filter(r => r.type==='shot').length, 0);
  const done = sections.reduce((a,s) => a + s.rows.filter(r => r.type==='shot' && r.checked).length, 0);
  const mins = totalShots * 3;
  const timeStr = mins === 0 ? '—' : mins >= 60
    ? `${Math.floor(mins/60)}t${mins%60 ? mins%60+'m':''}` : `${mins}m`;
  document.getElementById('stShots').textContent = totalShots;
  document.getElementById('stDone').textContent = done;
  document.getElementById('stSecs').textContent = sections.length;
  document.getElementById('stTime').textContent = timeStr;
  const pct = totalShots > 0 ? Math.round((done / totalShots) * 100) : 0;
  document.getElementById('progFill').value = pct;
  document.getElementById('progTxt').textContent = `${done} / ${totalShots}`;
}

// ── PREVIEW ──
function updatePreview() {
  const el = document.getElementById('preview');
  if (!sections.length) {
    el.innerHTML = '<div class="prev-empty">Formattert shotlist\nvises her...</div>';
    return;
  }
  const m = getMeta();
  let out = '';
  if (m.client || m.date) {
    const ds = m.date ? formatDate(m.date) : '';
    out += `Shotlist${ds ? ' '+ds : ''}${m.client ? ' — '+m.client : ''}\n`;
    if (m.crew) out += `Fotograf: ${m.crew}\n`;
    out += '─'.repeat(34) + '\n\n';
  }
  sections.forEach(sec => {
    if (sec.name) out += `${sec.name.toUpperCase()}\n\n`;
    sec.rows.forEach(row => {
      if (!row.text.trim()) return;
      out += row.type === 'shot' ? `☐ ${row.text}\n`
           : row.type === 'quote' ? `"${row.text}"\n`
           : `${row.text}\n`;
    });
    out += '\n';
  });
  const total = sections.reduce((a,s) => a + s.rows.filter(r => r.type==='shot').length, 0);
  out += '─'.repeat(34) + `\n${total} shots totalt`;
  el.textContent = out;
}

function formatDate(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T00:00:00');
  const days = ['søndag','mandag','tirsdag','onsdag','torsdag','fredag','lørdag'];
  const months = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
  return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]}`;
}
function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── FOCUS MODE ──
function toggleFocus() {
  focusMode = !focusMode;
  document.getElementById('app').classList.toggle('focused', focusMode);
  const btn = document.getElementById('focusBtn');
  if (btn) btn.classList.toggle('btn-active', focusMode);
  showToast(focusMode ? '⊞ Fokus-modus på' : '⊟ Fokus-modus av');
}

// ── OVERFLOW MENU ──
function toggleOverflow() {
  document.getElementById('overflowDrop').classList.toggle('dropdown-open');
}
function closeOverflow() {
  document.getElementById('overflowDrop').classList.remove('dropdown-open');
}

// ── MOBILE TABS ──
function switchTab(tab) {
  document.getElementById('app').classList.toggle('tab-sidebar', tab === 'sidebar');
  document.getElementById('tabEditor').classList.toggle('active', tab === 'editor');
  document.getElementById('tabSidebar').classList.toggle('active', tab === 'sidebar');
}

// ── COPY ──
function copyToClipboard() {
  const text = document.getElementById('preview').textContent;
  if (!sections.length) return;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ Kopiert! Lim inn i Milanote');
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Kopiert!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Kopier til Milanote'; btn.classList.remove('ok'); }, 2000);
  });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function clearAll() {
  if (sections.length && !confirm('Nullstille hele shotlisten?')) return;
  sections = [];
  ['metaClient','metaDate','metaCrew'].forEach(id => document.getElementById(id).value = '');
  meta = { client:'', date:'', crew:'' };
  renderAll(); save(); showToast('Nullstilt');
}

// ── EXPORT ──
function exportShot() {
  if (!sections.length) { showToast('Ingen shotlist å eksportere'); return; }
  const m = getMeta();
  const payload = { _app:'sw-shotlist', _version:1, exportedAt:new Date().toISOString(), meta:m, sections };
  const blob = new Blob([JSON.stringify(payload,null,2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const clientStr = (m.client||'Prosjekt').replace(/\s+/g,'-');
  let datePart = '';
  if (m.date) { const [y,mo,d] = m.date.split('-'); datePart = `-${d}-${mo}-${y.slice(2)}`; }
  a.href = url; a.download = `${clientStr}${datePart}.swshot`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast(`✓ Eksportert: ${a.download}`);
}

// ── IMPORT ──
function importShot() { document.getElementById('importFileInput').click(); }
function handleImportFile(e) {
  const file = e.target.files[0]; e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      if (p._app !== 'sw-shotlist') { showToast('✕ Ugyldig fil'); return; }
      sections = (p.sections || []).map((s,i) => ({ collapsed:false, color:COLORS[i%COLORS.length], ...s }));
      const m = p.meta || {};
      document.getElementById('metaClient').value = m.client || '';
      document.getElementById('metaDate').value = m.date || '';
      document.getElementById('metaCrew').value = m.crew || '';
      meta = m; renderAll(); save();
      showToast(`✓ Lastet inn: ${m.client || 'Ukjent'}`);
    } catch { showToast('✕ Kunne ikke lese filen'); }
  };
  reader.readAsText(file);
}

// ── DRAG & DROP ──
function sdStart(e) {
  dragSrc = e.currentTarget; dragSrc.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function sdOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.section-card').forEach(c => c.classList.remove('drag-over'));
  if (e.currentTarget !== dragSrc) e.currentTarget.classList.add('drag-over');
}
function sdDrop(e) {
  e.preventDefault();
  const target = e.currentTarget;
  document.querySelectorAll('.section-card').forEach(c => c.classList.remove('drag-over'));
  if (!dragSrc || dragSrc === target) return;
  const si = sections.findIndex(s => s.id === parseFloat(dragSrc.dataset.id));
  const ti = sections.findIndex(s => s.id === parseFloat(target.dataset.id));
  if (si < 0 || ti < 0) return;
  const [moved] = sections.splice(si, 1);
  sections.splice(ti, 0, moved);
  renderAll(); save();
}
function sdEnd() {
  document.querySelectorAll('.section-card').forEach(c => c.classList.remove('drag-over','dragging'));
  dragSrc = null;
}

function loadTemplate(key) {
  if (sections.length && !confirm('Erstatte eksisterende shotlist med mal?')) return;
  const tpl = templates[key];
  if (!tpl) return;
  sections = tpl.map((s,i) => makeSection(s.name, s.rows.map(r => makeRow(r.type, r.text)), COLORS[i % COLORS.length]));
  renderAll(); save();
  showToast(`Mal lastet: ${key}`);
}
