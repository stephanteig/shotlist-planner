name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build
        env:
          GITHUB_PAGES: true

      - name: Deploy to stephanteig.github.io
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://x-access-token:${{ secrets.PAGES_TOKEN }}@github.com/stephanteig/stephanteig.github.io.git pages-repo
          rm -rf pages-repo/shotlist-planner
          mkdir -p pages-repo/shotlist-planner
          cp -r dist/* pages-repo/shotlist-planner/
          cd pages-repo
          git add .
          git diff --cached --quiet || git commit -m "deploy: update shotlist-planner from ${{ github.sha }}"
          git push
