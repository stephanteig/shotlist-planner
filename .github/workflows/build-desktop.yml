name: Build Desktop Apps

on:
  push:
    tags:
      - "v*"          # Trigger on version tags: v0.1.0, v1.0.0, etc.
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"   # Apple Silicon
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"    # Intel Mac
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Firebase config — add these as repository secrets
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_DESKTOP_CLIENT_ID: ${{ secrets.VITE_GOOGLE_DESKTOP_CLIENT_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Markr ${{ github.ref_name }}"
          releaseBody: |
            ## Markr ${{ github.ref_name }}

            ### Nedlasting
            | Platform | Fil |
            |---|---|
            | Mac (Apple Silicon) | `Markr_aarch64.dmg` |
            | Mac (Intel) | `Markr_x86_64.dmg` |
            | Windows | `Markr_x64_en-US.msi` or `Markr_x64-setup.exe` |

            > **Mac:** Høyreklikk → Åpne første gang (Gatekeeper-advarsel for usignert app).
            > **Windows:** Klikk "Mer informasjon" → "Kjør likevel" ved SmartScreen-advarsel.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
